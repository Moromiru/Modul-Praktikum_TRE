<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modul Praktikum K26 - TRE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .header-modul { background-color: #1e3a8a; color: white; padding: 40px 0; border-bottom: 5px solid #3b82f6; }
        .btn-back { color: #dbeafe; text-decoration: none; display: inline-flex; align-items: center; margin-bottom: 15px; }
        .btn-back:hover { color: white; text-decoration: underline; }
        .filter-btn.active { background-color: #1e3a8a; color: white; }
    </style>
</head>
<body>

    <header class="header-modul">
        <div class="container">
            <a href="index.html" class="btn-back"><i class="bi bi-arrow-left me-2"></i> Kembali ke Pilih Kurikulum</a>
            <h1 class="fw-bold">Kurikulum 2026 (K26)</h1>
            <p class="mb-0 opacity-75">Daftar Modul Praktikum Terintegrasi Teknologi Rekayasa Elektro</p>
        </div>
    </header>

    <main class="container my-5">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4">
                
                <div class="mb-4 d-flex gap-2 flex-wrap">
                    <button class="btn btn-outline-primary btn-sm filter-btn active" onclick="filterPraktik('All')">Semua Praktik</button>
                    <button class="btn btn-outline-primary btn-sm filter-btn" onclick="filterPraktik('1')">Praktik 1</button>
                    <button class="btn btn-outline-primary btn-sm filter-btn" onclick="filterPraktik('2')">Praktik 2</button>
                </div>

                <div class="table-responsive">
                    <table id="tabelModul" class="table table-striped table-hover table-bordered align-middle" style="width:100%">
                        <thead class="table-dark">
                            <tr>
                                <th width="5%">No</th>
                                <th width="15%">Kode</th>
                                <th width="35%">Mata Kuliah (ID)</th>
                                <th width="10%">Praktik</th>
                                <th width="15%">Tahun Pembuatan</th>
                                <th width="20%">Link Modul</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>SVRE264107</td>
                                <td>Praktikum Pengukuran Listrik</td>
                                <td>2</td>
                                <td>2025</td>
                                <td>
                                    <button class="btn btn-sm btn-secondary w-100" disabled>
                                        <i class="bi bi-hourglass-split"></i> Akan dikembangkan
                                    </button>
                                </td>
                            </tr>
                            
                            <tr>
                                <td>2</td>
                                <td>SVRE264108</td>
                                <td>Praktikum Instalasi Listrik Dasar</td>
                                <td>1</td>
                                <td>2025</td>
                                <td>
                                    <a href="#" class="btn btn-sm btn-primary w-100">
                                        <i class="bi bi-download"></i> Unduh
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        $(document).ready(function() {
            var table = $('#tabelModul').DataTable({
                "language": { 
                    "search": "Cari Modul:",
                    "lengthMenu": "Tampilkan _MENU_ data",
                    "info": "Menampilkan _START_ sampai _END_ dari _TOTAL_ data",
                    "infoEmpty": "Tidak ada data yang ditemukan",
                    "zeroRecords": "Pencarian tidak menemukan hasil"
                }
            });

            // Fungsi filter diperbarui nama fungsinya menjadi filterPraktik
            window.filterPraktik = function(praktikVal) {
                $('.filter-btn').removeClass('active');
                $(event.target).addClass('active');

                // column(3) menunjuk pada kolom ke-4 yaitu kolom "Praktik" (Indeks dimulai dari 0)
                if(praktikVal === 'All') {
                    table.column(3).search('').draw();
                } else {
                    table.column(3).search('^' + praktikVal + '$', true, false).draw();
                }
            }
        });
    </script>
</body>
</html>
